services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: iams
      POSTGRES_USER: iams_user
      POSTGRES_PASSWORD: iams_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iams_user -d iams"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

